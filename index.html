<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyLog 專屬日曆系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* 純黑白極簡風格設定 */
    :root {
      --bg-light: #ffffff; 
      --bg-white: #ffffff; 
      --text-main: #000000; 
      --text-muted: #666666; 
      --border-color: #000000; 
      --accent-color: #000000;
      --font-family: 'Inter', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-family); }
    body { background-color: var(--bg-white); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 70px; }
    
    .top-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5vw; border-bottom: 1px solid var(--border-color); }
    .top-header .brand { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    
    /* 頂部右側動作按鈕與客製化語言選單 */
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .action-icon-btn { background: var(--bg-white); color: var(--text-main); border: 2px solid var(--text-main); width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; font-size: 14px; border-radius: 4px; }
    .action-icon-btn:hover { background: var(--text-main); color: var(--bg-white); }
    .version-text { font-size: 12px; font-weight: 800; color: var(--text-main); letter-spacing: 1px; margin-left: 4px; text-transform: uppercase; border: 2px solid var(--text-main); padding: 4px 8px; border-radius: 4px; }
    
    /* --- 客製化語言下拉選單 --- */
    .custom-lang-selector { position: relative; display: inline-block; user-select: none; }
    .lang-selected { border: 2px solid var(--text-main); padding: 4px 10px; height: 32px; font-size: 12px; font-weight: 800; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; background: var(--bg-white); color: var(--text-main); transition: 0.2s; }
    .lang-selected:hover { background: var(--text-main); color: var(--bg-white); }
    .lang-options { position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--bg-white); border: 2px solid var(--text-main); border-radius: 4px; display: none; flex-direction: column; min-width: 110px; z-index: 1000; box-shadow: 4px 4px 0px rgba(0,0,0,1); overflow: hidden; }
    .lang-options.show { display: flex; }
    .lang-option { padding: 10px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; text-align: center; border-bottom: 1px solid var(--border-color); }
    .lang-option:last-child { border-bottom: none; }
    .lang-option:hover { background: var(--text-main); color: var(--bg-white); }
    /* -------------------------- */

    .profile-section { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--border-color); }
    .avatar-wrapper { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--text-main); padding: 4px; margin-bottom: 12px; position: relative; }
    .avatar { width: 100%; height: 100%; background-color: var(--bg-white); border-radius: 50%; background-image: url('https://api.dicebear.com/7.x/notionists/svg?seed=Design'); background-size: cover; filter: grayscale(100%); }
    
    .profile-info { text-align: center; }
    .profile-info h1 { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .profile-info p { color: var(--text-main); font-size: 13px; font-weight: 700; letter-spacing: 1px; }
    .profile-info span { color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
    
    .logout-btn { background: var(--bg-white); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 0; padding: 6px 16px; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: 0.2s; text-transform: uppercase; }
    .logout-btn:hover { background: var(--text-main); color: var(--bg-white); }
    
    /* 視圖切換區塊 */
    .view-section { display: none; padding: 30px 5vw; width: 100%; max-width: 900px; margin: 0 auto; flex-grow: 1; }
    .view-section.active { display: block; }

    /* 日曆樣式 */
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .calendar-header h2 { font-size: 24px; font-weight: 800; text-transform: uppercase; }
    .nav-controls { display: flex; gap: 10px; }
    .nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
    .nav-btn:hover { background: var(--text-main); color: var(--bg-white); }
    
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; text-transform: uppercase; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px 10px; }
    .day-cell { aspect-ratio: 1 / 1; max-height: 70px; display: flex; justify-content: center; align-items: center; font-size: 15px; font-weight: 600; border: 1px solid transparent; cursor: pointer; position: relative; transition: 0.2s; }
    .day-cell:not(.empty):hover { border-color: var(--text-main); }
    .day-cell.today { background: var(--text-main); color: var(--bg-white); font-weight: 800; }
    .day-cell.today::after { content: ''; position: absolute; bottom: 6px; width: 5px; height: 5px; background-color: var(--bg-white); border-radius: 50%; }
    
    /* 朋友系統樣式 */
    .sticky-top-search { position: sticky; top: 0; background: var(--bg-white); z-index: 10; padding-bottom: 16px; border-bottom: 2px solid var(--border-color); margin-bottom: 24px; }
    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
    .badge { background: var(--text-main); color: var(--bg-white); font-size: 12px; font-weight: 800; padding: 2px 8px; border-radius: 12px; }

    .search-bar { display: flex; gap: 10px; margin-bottom: 12px; }
    .search-bar input { margin-bottom: 0; flex-grow: 1; border: 2px solid var(--border-color); padding: 10px; font-size: 14px; font-weight: 600; outline: none; transition: 0.2s; }
    .search-bar input:focus { background: #f9f9f9; }
    .search-bar button { width: auto; margin-bottom: 0; padding: 0 20px; border: 2px solid var(--text-main); background: var(--text-main); color: var(--bg-white); font-weight: 700; cursor: pointer; transition: 0.2s; }
    .search-bar button:hover { background: var(--bg-white); color: var(--text-main); }
    
    .friends-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
    .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 2px solid var(--border-color); background: var(--bg-white); }
    .friend-info { display: flex; align-items: center; gap: 14px; }
    .friend-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--text-main); background-color: #eee; }
    .friend-details h4 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .friend-details p { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; }
    
    .action-btns { display: flex; gap: 6px; }
    .btn-small { padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid var(--text-main); text-transform: uppercase; background: var(--bg-white); color: var(--text-main); transition: 0.2s; }
    .btn-small.primary { background: var(--text-main); color: var(--bg-white); }
    .btn-small:hover { background: var(--text-main); color: var(--bg-white); }
    .btn-small.primary:hover { background: var(--bg-white); color: var(--text-main); }
    .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-weight: 600; font-size: 13px; border: 2px solid var(--border-color); }

    /* 底部導覽列 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; border-top: 2px solid var(--border-color); background: var(--bg-white); z-index: 50; }
    .nav-tab { flex: 1; padding: 18px 0; text-align: center; font-weight: 800; font-size: 15px; cursor: pointer; background: var(--bg-white); color: var(--text-muted); border: none; border-right: 2px solid var(--border-color); text-transform: uppercase; transition: 0.2s; }
    .nav-tab:last-child { border-right: none; }
    .nav-tab.active { background: var(--text-main); color: var(--bg-white); }
    .nav-tab:hover:not(.active) { background: #f0f0f0; color: var(--text-main); }

    /* Modal 樣式 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: var(--bg-white); width: 90%; max-width: 400px; padding: 40px; border: 3px solid var(--border-color); box-shadow: 12px 12px 0px rgba(0,0,0,1); max-height: 90vh; overflow-y: auto; }
    .auth-main-title { font-size: 22px; font-weight: 900; color: var(--text-main); text-transform: uppercase; margin-bottom: 24px; text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 16px; letter-spacing: 2px;}
    .modal-header { font-weight: 800; font-size: 24px; margin-bottom: 8px; }
    .modal-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; font-weight: 500;}
    .modal-input { width: 100%; border: none; border-bottom: 2px solid var(--border-color); padding: 12px 0; font-size: 15px; outline: none; margin-bottom: 24px; background: transparent; font-weight: 600; transition: 0.2s; }
    .modal-input:focus { border-bottom-width: 4px; }
    .modal-input::placeholder { color: #aaaaaa; font-weight: 400; }
    .modal-btn { background: var(--text-main); color: var(--bg-white); border: 2px solid var(--text-main); padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px;}
    .modal-btn:hover { background: var(--bg-white); color: var(--text-main); }
    .google-btn { background: var(--bg-white); color: var(--text-main); border: 2px solid var(--border-color); }
    .google-btn:hover { background: var(--text-main); color: var(--bg-white); }
    .divider { display: flex; align-items: center; text-align: center; color: var(--text-main); font-size: 12px; font-weight: 700; margin-bottom: 16px; margin-top: 8px; text-transform: uppercase;}
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 2px solid var(--border-color); margin: 0 10px; }
    #register-fields, #google-complete-form { display: none; } 
    .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); font-weight: 500;}
    .auth-switch span { color: var(--text-main); font-weight: 800; cursor: pointer; text-decoration: underline; text-underline-offset: 4px;}
    .loading-text { font-size: 13px; font-weight: 700; color: var(--text-main); text-align: center; margin-bottom: 12px; display: none; text-transform: uppercase;}
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--text-main); }
  </style>
</head>
<body>

  <!-- 登入 / 註冊系統 Modal -->
  <div id="auth-overlay" class="modal-overlay active">
    <div class="modal-content">
      <div class="auth-main-title">MyLog</div>

      <div id="main-auth-form">
        <div class="modal-header" id="auth-title" data-i18n="auth_login_title">登入帳號</div>
        <div class="modal-subtitle" id="auth-subtitle" data-i18n="auth_login_subtitle">登入以存取您的專屬日曆。</div>
        <input type="text" id="auth-username" class="modal-input" data-i18n-placeholder="auth_username_placeholder" placeholder="用戶名稱" autocomplete="off">
        <div id="register-fields">
          <input type="text" id="auth-birthday" class="modal-input" data-i18n-placeholder="auth_birthday_placeholder" placeholder="生日月日 (選填)" maxlength="4">
        </div>
        <input type="password" id="auth-password" class="modal-input" data-i18n-placeholder="auth_password_placeholder" placeholder="密碼 (至少8碼，須含英文字母與數字)">
        
        <div class="loading-text" id="auth-loading" data-i18n="loading">處理中...</div>
        <button class="modal-btn" id="auth-submit-btn" data-i18n="auth_login_btn">登入</button>
        <div class="divider" data-i18n="auth_or">或</div>
        <button class="modal-btn google-btn" id="google-auth-btn">
          <i class="fa-brands fa-google"></i> <span id="google-btn-text" data-i18n="auth_google_login">使用 Google 登入</span>
        </button>
        
        <div class="auth-switch" id="auth-toggle-msg" data-i18n="auth_toggle_to_register_html">還沒有帳號？ <span>立即註冊</span></div>
      </div>

      <div id="google-complete-form">
        <div class="modal-header" data-i18n="google_comp_title">完成註冊</div>
        <div class="modal-subtitle" data-i18n="google_comp_subtitle">請為您的帳號設定一個用戶名稱。</div>
        <input type="text" id="google-username" class="modal-input" data-i18n-placeholder="auth_username_placeholder" placeholder="用戶名稱" autocomplete="off">
        
        <div class="loading-text" id="google-loading" data-i18n="loading">處理中...</div>
        <button class="modal-btn" id="google-complete-submit" data-i18n="google_comp_submit">確認註冊</button>
        
        <div class="auth-switch" style="margin-top: 10px;">
          <span id="cancel-google-complete" style="color: var(--text-muted); text-decoration: none; font-weight: 500;" data-i18n="google_comp_cancel">返回上一步</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 主畫面：頂部資訊與設定區塊 -->
  <div class="top-header">
    <div class="brand">MyLog</div>
    <div class="header-actions">
      
      <!-- 客製化語言下拉選單 -->
      <div class="custom-lang-selector" id="lang-selector">
        <div class="lang-selected" id="lang-selected-btn">
          <i class="fa-solid fa-globe"></i> <span id="current-lang-text">繁中</span>
        </div>
        <div class="lang-options" id="lang-options-list">
          <div class="lang-option" data-lang="zh-TW">繁體中文</div>
          <div class="lang-option" data-lang="zh-CN">简体中文</div>
          <div class="lang-option" data-lang="en">English</div>
        </div>
      </div>

      <button class="action-icon-btn" title="設定"><i class="fa-solid fa-gear"></i></button>
      <button class="action-icon-btn" title="信件/訊息"><i class="fa-regular fa-envelope"></i></button>
      <span class="version-text">v.01</span>
    </div>
  </div>

  <div class="profile-section">
    <div class="avatar-wrapper"><div class="avatar"></div></div>
    <div class="profile-info">
      <h1 id="display-name">UserName</h1>
      <p id="display-exclusive-code" data-i18n="profile_loading">載入中...</p>
      <span data-i18n="profile_code_label">專屬用戶碼</span><br>
      <button class="logout-btn" id="logout-btn" data-i18n="profile_logout">登出系統</button>
    </div>
  </div>

  <!-- 視圖 1：日曆 -->
  <div class="view-section active" id="view-calendar">
    <div class="calendar-header">
      <h2 id="month-year-display"></h2>
      <div class="nav-controls">
        <div class="nav-btn" id="prev-month"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="nav-btn" id="next-month"><i class="fa-solid fa-arrow-right"></i></div>
      </div>
    </div>
    <div class="weekdays" id="calendar-weekdays">
      <div data-i18n="day_0">日</div><div data-i18n="day_1">一</div><div data-i18n="day_2">二</div>
      <div data-i18n="day_3">三</div><div data-i18n="day_4">四</div><div data-i18n="day_5">五</div><div data-i18n="day_6">六</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <!-- 視圖 2：朋友系統 -->
  <div class="view-section" id="view-friends">
    <div class="sticky-top-search">
      <div class="section-title" data-i18n="friends_search_title">搜尋好友</div>
      <div class="search-bar">
        <input type="text" id="friend-search-input" data-i18n-placeholder="friends_search_placeholder" placeholder="輸入用戶名或專屬碼搜尋...">
        <button id="friend-search-btn" data-i18n="friends_search_btn">搜尋</button>
      </div>
      <div id="search-result-area" style="display: none; margin-top: 16px;"></div>
    </div>

    <div class="section-title"><span data-i18n="friends_requests_title">好友申請</span> <span class="badge" id="requests-badge" style="display: none;">0</span></div>
    <div class="friends-list" id="pending-requests-list">
      <div class="empty-state" data-i18n="friends_requests_empty">目前沒有新的好友申請。</div>
    </div>

    <div class="section-title" data-i18n="friends_list_title">我的好友</div>
    <div class="friends-list" id="my-friends-list">
      <div class="empty-state" data-i18n="friends_list_empty">尚未添加任何好友。</div>
    </div>
  </div>

  <!-- 底部導覽列 -->
  <div class="bottom-nav">
    <button class="nav-tab active" data-target="view-calendar">
      <i class="fa-regular fa-calendar" style="margin-right: 6px;"></i> <span data-i18n="nav_calendar">日曆</span>
    </button>
    <button class="nav-tab" data-target="view-friends">
      <i class="fa-solid fa-user-group" style="margin-right: 6px;"></i> <span data-i18n="nav_friends">朋友</span>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, get, child, onValue, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ==========================================
    // =            多國語言字典系統             =
    // ==========================================
    const i18n = {
      "zh-TW": {
        lang_name: "繁中",
        auth_login_title: "登入帳號",
        auth_login_subtitle: "登入以存取您的專屬日曆。",
        auth_reg_title: "註冊帳號",
        auth_reg_subtitle: "建立專屬日曆與辨識碼。",
        auth_username_placeholder: "用戶名稱",
        auth_birthday_placeholder: "生日月日 (選填)",
        auth_password_placeholder: "密碼 (至少8碼，須含英文字母與數字)",
        loading: "處理中...",
        auth_login_btn: "登入",
        auth_reg_btn: "註冊",
        auth_or: "或",
        auth_google_login: "使用 Google 登入",
        auth_google_reg: "使用 Google 註冊",
        auth_toggle_to_register_html: "還沒有帳號？ <span>立即註冊</span>",
        auth_toggle_to_login_html: "已經有帳號了？ <span>直接登入</span>",
        google_comp_title: "完成註冊",
        google_comp_subtitle: "請為您的帳號設定一個用戶名稱。",
        google_comp_submit: "確認註冊",
        google_comp_cancel: "返回上一步",
        profile_loading: "載入中...",
        profile_code_label: "專屬用戶碼",
        profile_logout: "登出系統",
        nav_calendar: "日曆",
        nav_friends: "朋友",
        day_0: "日", day_1: "一", day_2: "二", day_3: "三", day_4: "四", day_5: "五", day_6: "六",
        friends_search_title: "搜尋好友",
        friends_search_placeholder: "輸入用戶名或專屬碼搜尋...",
        friends_search_btn: "搜尋",
        friends_requests_title: "好友申請",
        friends_requests_empty: "目前沒有新的好友申請。",
        friends_list_title: "我的好友",
        friends_list_empty: "尚未添加任何好友。",
        btn_send_request: "發送申請",
        btn_accept: "接受",
        btn_reject: "拒絕",
        btn_delete: "刪除",
        status_online: "在線",

        alert_no_user: "請填寫用戶名稱！",

        alert_login_fail: "登入失敗，請確認帳號或密碼是否正確。",
        alert_bd_length: "生日請填寫四碼！",

        alert_reg_success: "註冊成功！專屬碼：",
        alert_name_used: "此用戶名稱已被註冊！",
        alert_reg_fail: "註冊失敗：",
        alert_g_not_reg: "此 Google 帳號尚未註冊！請切換至「註冊」進行註冊。",
        alert_g_auto_login: "此 Google 帳號已經註冊過，已為您自動登入！",
        alert_auth_fail: "驗證失敗：",
        alert_search_empty: "搜尋中...",
        alert_already_friend: "你們已經是好友了！",
        alert_req_sent: "已成功發送好友申請！",
        alert_no_match: "找不到符合條件的用戶，請確認輸入是否正確。",

    function getSafeEmail(username) {
      let safeStr = '';
      for(let i=0; i<username.length; i++) safeStr += username.charCodeAt(i).toString(36);
      return `user_${safeStr}@calender.local`;
    }

    async function createUserDataInDB(user, username, birthday) {
      const countRef = ref(db, 'metadata/userCount');
      const countSnap = await get(countRef);
      const currentCount = countSnap.exists() ? countSnap.val() + 1 : 1;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const ranLetters = Array.from({length:3}, () => chars.charAt(Math.floor(Math.random() * chars.length))).join('');
      const exclusiveCode = `${String(currentCount).padStart(3, '0')}-${birthday || '0000'}-${ranLetters}`;

      const data = { username: username, birthday: birthday || '0000', exclusiveCode: exclusiveCode, createdAt: new Date().toISOString() };
      await set(ref(db, 'users/' + user.uid), data);
      await set(countRef, currentCount);
      return data;
    }

    elements.submitBtn.addEventListener('click', async () => {
      const username = elements.username.value.trim();
      const password = elements.password.value.trim();
      if (!username) return alert(t('alert_no_user'));
      if (!password) return alert(t('alert_no_pw'));
      const pseudoEmail = getSafeEmail(username);
      elements.loading.style.display = 'block';

      if (isLoginMode) {
        try { await signInWithEmailAndPassword(auth, pseudoEmail, password); } 
        catch (error) { alert(t('alert_login_fail')); }
      } else {
        let birthday = elements.birthday.value.trim();
        if(birthday && birthday.length !== 4) { elements.loading.style.display = 'none'; return alert(t('alert_bd_length')); }
        if (!passwordRegex.test(password)) { elements.loading.style.display = 'none'; return alert(t('alert_pw_format')); }
        try {
          const cred = await createUserWithEmailAndPassword(auth, pseudoEmail, password);
          const userData = await createUserDataInDB(cred.user, username, birthday);
          alert(`${t('alert_reg_success')}${userData.exclusiveCode}`);
          updateProfileUI(userData.username, userData.exclusiveCode);
        } catch (error) {
          if (error.code === 'auth/email-already-in-use') alert(t('alert_name_used')); else alert(t('alert_reg_fail') + error.message);
        }
      }
      elements.loading.style.display = 'none';
    });

    elements.googleBtn.addEventListener('click', async () => {
      elements.loading.style.display = 'block';
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        const userSnap = await get(child(ref(db), `users/${user.uid}`));
        if (!userSnap.exists()) {
          if (isLoginMode) { await user.delete(); await signOut(auth); alert(t('alert_g_not_reg')); } 
          else {
            pendingGoogleUser = user;
            elements.mainForm.style.display = 'none';
            elements.googleCompleteForm.style.display = 'block';
          }
        } else {
          if (!isLoginMode) alert(t('alert_g_auto_login'));
          updateProfileUI(userSnap.val().username, userSnap.val().exclusiveCode);
        }
      } catch (error) { if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') alert(t('alert_auth_fail') + error.message); } 
      finally { elements.loading.style.display = 'none'; }
    });

    elements.googleSubmitBtn.addEventListener('click', async () => {
      const gUsername = elements.googleUsernameInput.value.trim();
      if (!gUsername) return alert(t('alert_no_user'));
      elements.googleLoading.style.display = 'block';
      try {
        const userData = await createUserDataInDB(pendingGoogleUser, gUsername, "0000");
        alert(`${t('alert_reg_success')}${userData.exclusiveCode}`);
        updateProfileUI(userData.username, userData.exclusiveCode);
        elements.googleCompleteForm.style.display = 'none';
        elements.mainForm.style.display = 'block';
        pendingGoogleUser = null;
      } catch (error) { alert(t('alert_reg_fail') + error.message); }
      elements.googleLoading.style.display = 'none';
    });

    elements.logoutBtn.addEventListener('click', () => { signOut(auth); location.reload(); });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if (pendingGoogleUser && user.uid === pendingGoogleUser.uid) return;
        try {
          const snapshot = await get(child(ref(db), `users/${user.uid}`));
          if (snapshot.exists()) {
            currentUserData = snapshot.val();
            currentUserUid = user.uid;
            updateProfileUI(currentUserData.username, currentUserData.exclusiveCode);
            
            const connectedRef = ref(db, '.info/connected');
            const userStatusRef = ref(db, `users/${user.uid}/status`);
            onValue(connectedRef, (snap) => {
              if (snap.val() === true) {
                onDisconnect(userStatusRef).set('offline').then(() => {
                  set(userStatusRef, 'online');
                });
              }
            });

            initFriendsSystem(); 
          } else { elements.overlay.classList.add('active'); }

    // 更新搜尋結果的語言
    function updateSearchAreaByLang() {
      if(lastSearchedHtml === 'empty') document.getElementById('search-result-area').innerHTML = `<div class="empty-state">${t('alert_no_match')}</div>`;
      else if(lastSearchedHtml === 'no_users') document.getElementById('search-result-area').innerHTML = `<div class="empty-state">${t('alert_no_users_sys')}</div>`;
      else if(lastSearchedHtml === 'err') document.getElementById('search-result-area').innerHTML = `<div class="empty-state">${t('alert_search_err')}</div>`;
      // 若是真正的結果，因為需要替換按鈕文字，需重新產生HTML。實作上若有上次搜尋緩存可以直接重繪。為簡化，由使用者再次搜尋觸發即可。
    }

    document.getElementById('friend-search-btn').addEventListener('click', async () => {
      const term = document.getElementById('friend-search-input').value.trim();
      const resultArea = document.getElementById('search-result-area');
      if (!term) return alert(t('alert_search_empty').replace('...','')); // Simple check

      resultArea.style.display = 'block';
      resultArea.innerHTML = `<div class="empty-state">${t('alert_search_empty')}</div>`;

      try {
        const usersSnap = await get(ref(db, 'users'));
        let found = false;
        let html = '';
        
        if (usersSnap.exists()) {
          usersSnap.forEach(childSnap => {
            const uId = childSnap.key;
            const uData = childSnap.val();
            if (uId === currentUserUid) return; 
            if (uData.username === term || uData.exclusiveCode === term) {
              found = true;
              html += `

                  </div>

            }
          });
          
          if(found) { resultArea.innerHTML = html; lastSearchedHtml = 'found'; } 
          else { resultArea.innerHTML = `<div class="empty-state">${t('alert_no_match')}</div>`; lastSearchedHtml = 'empty'; }

          resultArea.innerHTML = `<div class="empty-state">${t('alert_no_users_sys')}</div>`; lastSearchedHtml = 'no_users';

    window.sendFriendRequest = async (targetUid) => {
      try {
        const friendCheck = await get(ref(db, `friends/${currentUserUid}/list/${targetUid}`));
        if(friendCheck.exists()) return alert(t('alert_already_friend'));
        
        await set(ref(db, `friends/${targetUid}/pending/${currentUserUid}`), true);
        alert(t('alert_req_sent'));
        document.getElementById('search-result-area').innerHTML = ''; 
        document.getElementById('friend-search-input').value = '';
      } catch (e) { alert(t('alert_op_fail')); }

    function renderPendingRequests(dataArray) {
      const listDiv = document.getElementById('pending-requests-list');
      if(dataArray.length === 0) {
        listDiv.innerHTML = `<div class="empty-state">${t('friends_requests_empty')}</div>`;
        return;
      }
      let html = '';
      dataArray.forEach(req => {
        if (req.data) {
          html += `

              <div class="friend-info">
                <div class="friend-avatar"></div>
                <div class="friend-details">
                  <h4>${req.data.username}</h4>

                <button class="btn-small primary" onclick="acceptRequest('${req.uid}')">${t('btn_accept')}</button>
                <button class="btn-small" onclick="rejectRequest('${req.uid}')">${t('btn_reject')}</button>
              </div>
            </div>`;
        }
      });
      listDiv.innerHTML = html;
    }

    function listenToPendingRequests() {
      const pendingRef = ref(db, `friends/${currentUserUid}/pending`);
      onValue(pendingRef, async (snapshot) => {
        const badge = document.getElementById('requests-badge');
        if (snapshot.exists()) {
          const requests = snapshot.val();
          const uids = Object.keys(requests);
          badge.style.display = 'inline-block';
          badge.textContent = uids.length;
          try {
            const requestsPromises = uids.map(async (uid) => {
              const userSnap = await get(child(ref(db), `users/${uid}`));
              return { uid, data: userSnap.exists() ? userSnap.val() : null };
            });
            currentPendingData = await Promise.all(requestsPromises);
            renderPendingRequests(currentPendingData);
          } catch (error) { console.error(error); }
        } else {
          badge.style.display = 'none';
          currentPendingData = [];
          renderPendingRequests(currentPendingData);
        }
      });
    }

    window.acceptRequest = async (requesterUid) => {
      try {
        const updates = {};
        updates[`friends/${currentUserUid}/list/${requesterUid}`] = true;
        updates[`friends/${requesterUid}/list/${currentUserUid}`] = true;
        updates[`friends/${currentUserUid}/pending/${requesterUid}`] = null;
        await update(ref(db), updates);
      } catch (e) { alert(t('alert_op_fail')); }
    };

    window.rejectRequest = async (requesterUid) => {
      try { await remove(ref(db, `friends/${currentUserUid}/pending/${requesterUid}`)); } 
      catch (e) { alert(t('alert_op_fail')); }
    };

    function renderMyFriendsList(dataArray) {

      if(dataArray.length === 0) {
        listDiv.innerHTML = `<div class="empty-state">${t('friends_list_empty')}</div>`;

      }
      let html = '';
      dataArray.forEach(friend => {
        if (friend.data) {
          html += `
            <div class="friend-item">
              <div class="friend-info">
                <div class="friend-avatar"></div>
                <div class="friend-details">
                  <h4 style="display: flex; align-items: center;">
                    <span id="status-${friend.uid}" class="friend-status" data-uid="${friend.uid}" style="font-size: 11px; font-weight: 800; margin-right: 8px; color: var(--text-muted);">${t('status_offline')}</span>
                    ${friend.data.username} 
                  </h4>
                  <p>${t('id_label')} ${friend.data.exclusiveCode}</p>
                </div>
              </div>
              <div class="action-btns">
                <button class="btn-small" onclick="removeFriend('${friend.uid}')">${t('btn_delete')}</button>
              </div>
            </div>`;
        }
      });
      listDiv.innerHTML = html;
      
      // 重新綁定狀態監聽以更新文字
      dataArray.forEach(friend => {
        const statusRef = ref(db, `users/${friend.uid}/status`);
        onValue(statusRef, (statusSnap) => {
          const statusEl = document.getElementById(`status-${friend.uid}`);
          if (statusEl) {
            if (statusSnap.exists() && statusSnap.val() === 'online') {
              statusEl.textContent = t('status_online');
              statusEl.style.color = 'var(--text-main)'; 
            } else {
              statusEl.textContent = t('status_offline');
              statusEl.style.color = 'var(--text-muted)'; 
            }
          }
        });
      });
    }

    function listenToFriendsList() {
      const friendsRef = ref(db, `friends/${currentUserUid}/list`);
      onValue(friendsRef, async (snapshot) => {
        if (snapshot.exists()) {
          const friends = snapshot.val();
          const uids = Object.keys(friends);
          try {
            const friendsDataPromises = uids.map(async (uid) => {
              const userSnap = await get(child(ref(db), `users/${uid}`));
              return { uid, data: userSnap.exists() ? userSnap.val() : null };
            });
            currentFriendsData = await Promise.all(friendsDataPromises);
            renderMyFriendsList(currentFriendsData);
          } catch (error) { console.error(error); }
        } else {
          currentFriendsData = [];
          renderMyFriendsList(currentFriendsData);
        }
      });
    }

    window.removeFriend = async (targetUid) => {
      if(confirm(t('alert_del_confirm'))) {
        const updates = {};
        updates[`friends/${currentUserUid}/list/${targetUid}`] = null;
        updates[`friends/${targetUid}/list/${currentUserUid}`] = null;
        await update(ref(db), updates);
      }
    };

    // --- 日曆渲染邏輯 ---
    let currentDate = new Date();
    let today = new Date();
    
    function renderCalendar() {
      const daysGrid = document.getElementById('days-grid');
      daysGrid.innerHTML = ''; 
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth(); 
      document.getElementById('month-year-display').textContent = i18n[currentLang].month_format(year, month + 1);
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'day-cell empty';
        daysGrid.appendChild(div);
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const div = document.createElement('div');
        div.className = 'day-cell' + (year === today.getFullYear() && month === today.getMonth() && day === today.getDate() ? ' today' : '');
        div.textContent = day;
        daysGrid.appendChild(div);
      }
    }

    document.getElementById('prev-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
    document.getElementById('next-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
    
    // 初始化UI語系與日曆
    updateLanguageUI();
  </script>
</body>
</html>
